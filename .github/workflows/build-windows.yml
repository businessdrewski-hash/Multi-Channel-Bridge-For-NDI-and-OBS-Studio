name: Build Multichannel Bridge for DistroAV (Windows)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Check out bridge repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = (Get-Content VERSION -Raw).Trim()
          if (-not $version) { throw 'VERSION is empty.' }
          if ($version -notmatch '^v?(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)') {
            throw "VERSION must begin with major.minor.patch, for example 0.5.0-alpha1. Found: $version"
          }
          $numericVersion = "$($Matches.major).$($Matches.minor).$($Matches.patch).0"
          "version=$version" >> $env:GITHUB_OUTPUT
          "numeric_version=$numericVersion" >> $env:GITHUB_OUTPUT

      - name: Enable MSVC developer tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Test standalone A/V Governor
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force build-tests | Out-Null
          cl /nologo /std:c++17 /EHsc /W4 /WX /Ihotfix\bridge `
            hotfix\bridge\av-governor.cpp tests\av-governor-tests.cpp `
            /Fe:build-tests\av-governor-tests.exe
          if ($LASTEXITCODE -ne 0) { throw "A/V Governor test compilation failed with exit code $LASTEXITCODE" }
          & .\build-tests\av-governor-tests.exe
          if ($LASTEXITCODE -ne 0) { throw "A/V Governor tests failed with exit code $LASTEXITCODE" }

      - name: Test allocation-free Sender Sync Core
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cl /nologo /std:c++17 /EHsc /W4 /WX /O2 /Ihotfix\bridge `
            hotfix\bridge\sender-sync-core.cpp tests\sender-sync-core-tests.cpp `
            /Fe:build-tests\sender-sync-core-tests.exe
          if ($LASTEXITCODE -ne 0) { throw "Sender Sync Core test compilation failed with exit code $LASTEXITCODE" }
          & .\build-tests\sender-sync-core-tests.exe
          if ($LASTEXITCODE -ne 0) { throw "Sender Sync Core tests failed with exit code $LASTEXITCODE" }

      - name: Audit settings and callback safety
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python tests/test_parameter_paths.py
          python tests/test_callback_safety.py
          python tests/test_release_metadata.py

      - name: Check out clean DistroAV 6.2.1
        uses: actions/checkout@v4
        with:
          repository: DistroAV/DistroAV
          ref: 6.2.1
          path: distroav
          submodules: recursive
          fetch-depth: 1

      - name: Validate and apply bridge patch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python -m py_compile hotfix/scripts/patch_distroav.py
          python hotfix/scripts/patch_distroav.py distroav

      - name: Export reviewable DistroAV patch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Push-Location distroav
          git add -N src/av-governor.cpp src/av-governor.h src/sender-sync-core.cpp src/sender-sync-core.h `
            src/multichannel-bridge.cpp src/multichannel-bridge.h MULTICHANNEL-BRIDGE.md
          git diff --binary -- CMakeLists.txt src/plugin-main.cpp src/main-output.cpp src/ndi-output.cpp src/ndi-source.cpp `
            src/av-governor.cpp src/av-governor.h src/sender-sync-core.cpp src/sender-sync-core.h `
            src/multichannel-bridge.cpp src/multichannel-bridge.h MULTICHANNEL-BRIDGE.md `
            | Set-Content -Encoding utf8 "$env:GITHUB_WORKSPACE\Multichannel-Bridge-DistroAV-6.2.1.patch"
          Pop-Location
          if (-not (Test-Path "$env:GITHUB_WORKSPACE\Multichannel-Bridge-DistroAV-6.2.1.patch")) {
            throw 'Review patch was not produced.'
          }

      - name: Build custom DistroAV x64
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Push-Location distroav
          & .github/scripts/Build-Windows.ps1 -Target x64 -Configuration RelWithDebInfo
          Pop-Location

      - name: Create portable package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ steps.version.outputs.version }}'
          $package = Join-Path $env:GITHUB_WORKSPACE 'obs-install'
          $dist = Join-Path $env:GITHUB_WORKSPACE 'dist'
          $built = Join-Path $env:GITHUB_WORKSPACE 'distroav\release\RelWithDebInfo\distroav'

          Remove-Item -Recurse -Force $package,$dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $package,$dist | Out-Null

          if (-not (Test-Path "$built\bin")) {
            throw "DistroAV build output not found at $built"
          }

          Copy-Item -Path "$built\bin" -Destination "$package\obs-plugins" -Recurse -Force
          New-Item -ItemType Directory -Force "$package\data\obs-plugins\distroav" | Out-Null
          if (Test-Path "$built\data\locale") {
            Copy-Item -Path "$built\data\locale" -Destination "$package\data\obs-plugins\distroav\locale" -Recurse -Force
          }

          # Runtime-critical package files
          Copy-Item README.md $package
          Copy-Item LICENSE-NOTICE.txt $package
          Copy-Item Multichannel-Bridge-DistroAV-6.2.1.patch $package
          Copy-Item Multichannel-Bridge-DistroAV-6.2.1.patch $dist

          # Supplemental documentation must never prevent the binary installer
          # from compiling. Copy every file that is present and report omissions.
          $optionalDocs = @(
            'INSTALL-BOTH-PCS.md',
            'RELEASE-NOTES.md',
            'AV-GOVERNOR.md',
            'UPSTREAM-NOTES.md',
            'ROADMAP.md'
          )
          foreach ($doc in $optionalDocs) {
            if (Test-Path $doc) {
              Copy-Item $doc $package
            } else {
              Write-Warning "$doc was not found; continuing without it."
            }
          }
          Copy-Item distroav/LICENSE "$package\DISTROAV-GPL-LICENSE.txt"
          Copy-Item tools/Install-MultichannelBridge.ps1 $package
          Copy-Item tools/Install-MultichannelBridge.cmd $package
          Copy-Item tools/Uninstall-MultichannelBridge.ps1 $package
          Copy-Item tools/Uninstall-MultichannelBridge.cmd $package

          $requiredPackagePaths = @(
            "$package\obs-plugins",
            "$package\data",
            "$package\README.md",
            "$package\LICENSE-NOTICE.txt",
            "$package\DISTROAV-GPL-LICENSE.txt",
            "$package\Install-MultichannelBridge.ps1",
            "$package\Uninstall-MultichannelBridge.ps1"
          )
          foreach ($requiredPath in $requiredPackagePaths) {
            if (-not (Test-Path $requiredPath)) {
              throw "Required staged installer input is missing: $requiredPath"
            }
          }

          @"
          This binary was built from:
          $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/tree/$env:GITHUB_SHA

          The modified DistroAV build is GPL-2.0-or-later. Preserve the license
          notices and provide the complete corresponding source when redistributing.
          "@ | Set-Content -Encoding utf8 "$package\SOURCE-CODE.txt"

          $portableZip = Join-Path $dist "Multichannel-Bridge-for-DistroAV-v$version-Portable-Windows-x64.zip"
          Compress-Archive -Path "$package\*" -DestinationPath $portableZip -Force

      - name: Install Inno Setup compiler
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $innoRoot = Join-Path $env:RUNNER_TEMP 'Inno Setup 6'
          $installer = Join-Path $env:RUNNER_TEMP 'innosetup-6.7.3.exe'
          $url = 'https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe'

          Invoke-WebRequest -Uri $url -OutFile $installer
          $process = Start-Process -FilePath $installer -ArgumentList @(
            '/VERYSILENT',
            '/SUPPRESSMSGBOXES',
            '/NORESTART',
            '/SP-',
            "/DIR=`"$innoRoot`""
          ) -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Inno Setup installation failed with exit code $($process.ExitCode)."
          }

          $iscc = Join-Path $innoRoot 'ISCC.exe'
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          "ISCC=$iscc" >> $env:GITHUB_ENV

      - name: Build Windows EXE installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ steps.version.outputs.version }}'
          $numericVersion = '${{ steps.version.outputs.numeric_version }}'
          $package = Join-Path $env:GITHUB_WORKSPACE 'obs-install'
          $dist = Join-Path $env:GITHUB_WORKSPACE 'dist'
          $script = Join-Path $env:GITHUB_WORKSPACE 'installer\MultichannelBridge.iss'

          & $env:ISCC /Qp "/DAppVersion=$version" "/DAppNumericVersion=$numericVersion" "/DSourceRoot=$package" "/DOutputDir=$dist" $script
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

          $setup = Join-Path $dist "Multichannel-Bridge-for-DistroAV-Setup-v$version.exe"
          if (-not (Test-Path $setup)) { throw "Installer EXE was not produced: $setup" }

      - name: Create checksums and verify release contents
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dist = Join-Path $env:GITHUB_WORKSPACE 'dist'
          $files = Get-ChildItem $dist -File | Where-Object { $_.Name -ne 'SHA256SUMS.txt' } | Sort-Object Name
          if (-not ($files.Name -match '\.exe$')) { throw 'Release is missing the setup EXE.' }
          if (-not ($files.Name -match 'Portable-Windows-x64\.zip$')) { throw 'Release is missing the portable ZIP.' }

          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content -Encoding ascii (Join-Path $dist 'SHA256SUMS.txt')
          Get-ChildItem $dist | Format-Table Name,Length,LastWriteTime

      - name: Upload Windows release package
        uses: actions/upload-artifact@v4
        with:
          name: Multichannel-Bridge-for-DistroAV-v${{ steps.version.outputs.version }}-Windows-x64
          path: dist/*
          retention-days: 30
