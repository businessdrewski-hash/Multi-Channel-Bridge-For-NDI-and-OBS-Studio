name: Build DistroAV Multichannel Hotfix

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Check out hotfix repository
        uses: actions/checkout@v4
        with:
          path: hotfix

      - name: Check out DistroAV 6.2.1
        uses: actions/checkout@v4
        with:
          repository: DistroAV/DistroAV
          ref: 6.2.1
          submodules: recursive
          fetch-depth: 0
          path: distroav

      - name: Apply multichannel patch
        shell: pwsh
        run: |
          python hotfix/scripts/patch_distroav.py distroav

      - name: Build patched DistroAV
        shell: pwsh
        working-directory: distroav
        run: |
          $ErrorActionPreference = 'Stop'
          & .github/scripts/Build-Windows.ps1 -Target x64 -Configuration RelWithDebInfo

      - name: Package patched DistroAV
        shell: pwsh
        working-directory: distroav
        run: |
          $ErrorActionPreference = 'Stop'
          & .github/scripts/Package-Windows.ps1 -Target x64 -Configuration RelWithDebInfo

      - name: Upload normal Windows package
        uses: actions/upload-artifact@v4
        with:
          name: DistroAV-6.2.1-multichannel-hotfix-windows-x64
          path: |
            distroav/release/*.zip
            distroav/release/*.exe
          if-no-files-found: warn

      - name: Upload portable Windows package
        uses: actions/upload-artifact@v4
        with:
          name: DistroAV-6.2.1-multichannel-hotfix-windows-x64-portable
          path: distroav/release-portable/*.zip
          if-no-files-found: warn

      - name: Upload patched source tree
        uses: actions/upload-artifact@v4
        with:
          name: DistroAV-6.2.1-multichannel-hotfix-source
          path: |
            distroav/src/ndi-output.cpp
            distroav/src/main-output.cpp
            distroav/MULTICHANNEL-HOTFIX.md
